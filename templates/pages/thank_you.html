
    <style>
        .thank-you-container {
            background: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh; /* Adjusted for SPA content area */
            text-align: center;
            font-family: 'DM Sans', sans-serif;
            width: 100%;
        }

        .thank-you-card {
            background: #fff;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
            margin: 0 auto;
        }

        .thank-you-card h1 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        .thank-you-card p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(254, 87, 34, 0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    <div class="thank-you-container">
        <div class="thank-you-card">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none"
                stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                style="margin-bottom:20px;">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <h1>Thank You!</h1>
            <p>Your registration has been successfully submitted. We will review your application and get back to you
                shortly.</p>
            <a href="{{ url_for('home') }}" class="btn-home" onclick="loadPage('home'); return false;">Return to Home</a>
        </div>
    </div>
