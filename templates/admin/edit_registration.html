<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2878EB;
            --secondary: #F14D5D;
            --dark: #120F2D;
            --light: #ECF4FF;
            --gray: #6B6A75;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Open Sans', sans-serif;
            color: var(--gray);
            min-height: 100vh;
        }

        .edit-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .edit-header {
            background: linear-gradient(135deg, var(--primary) 0%, #1e5cc8 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 4px 20px rgba(40, 120, 235, 0.2);
        }

        .edit-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }

        .edit-header a {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .edit-header a:hover {
            background: rgba(255,255,255, 0.3);
            transform: translateY(-2px);
        }

        /* Form Card */
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: 'Open Sans', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(40, 120, 235, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
            flex-wrap: wrap;
        }

        .btn-submit {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #1e5cc8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 120, 235, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: var(--dark);
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .edit-container {
                padding: 15px;
            }

            .edit-header {
                padding: 20px;
                flex-direction: column;
                align-items: flex-start;
            }

            .edit-header h1 {
                font-size: 1.5rem;
            }

            .form-card {
                padding: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn-submit {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .edit-header h1 {
                font-size: 1.2rem;
            }

            .form-section h2 {
                font-size: 1.1rem;
            }

            .form-group input,
            .form-group select,
            .form-group textarea {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="edit-container">
        <div class="edit-header">
            <div>
                <h1><i class="fas fa-user-edit" style="margin-right: 10px;"></i>Edit Registration</h1>
            </div>
            <a href="{{ url_for('admin_dashboard') }}" title="Back to dashboard"><i class="fas fa-arrow-left"></i> Back</a>
        </div>

        <div class="form-card">
            <form method="POST" action="{{ url_for('edit_registration', reg_id=registration[0]) }}">
                <!-- Personal Information Section -->
                <div class="form-section">
                    <h2><i class="fas fa-user" style="margin-right: 8px;"></i>Personal Information</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="full_name">Full Name <span style="color: var(--danger);">*</span></label>
                            <input type="text" id="full_name" name="full_name" value="{{ registration[1] }}" required>
                        </div>
                        <div class="form-group">
                            <label for="dob">Date of Birth</label>
                            <input type="date" id="dob" name="dob" value="{{ registration[5] }}">
                        </div>
                        <div class="form-group">
                            <label for="sex">Sex</label>
                            <select id="sex" name="sex">
                                <option value="">Select...</option>
                                <option value="Male" {% if registration[7] == 'Male' %}selected{% endif %}>Male</option>
                                <option value="Female" {% if registration[7] == 'Female' %}selected{% endif %}>Female</option>
                                <option value="Other" {% if registration[7] == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email <span style="color: var(--danger);">*</span></label>
                            <input type="email" id="email" name="email" value="{{ registration[2] }}" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone <span style="color: var(--danger);">*</span></label>
                            <input type="tel" id="phone" name="phone" value="{{ registration[3] }}" required>
                        </div>
                        <div class="form-group">
                            <label for="nationality">Nationality</label>
                            <input type="text" id="nationality" name="nationality" value="{{ registration[8] }}">
                        </div>
                    </div>
                </div>

                <!-- Address Information Section -->
                <div class="form-section">
                    <h2><i class="fas fa-map-marker-alt" style="margin-right: 8px;"></i>Address Information</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" name="address" value="{{ registration[6] }}">
                        </div>
                        <div class="form-group">
                            <label for="state">State/Province</label>
                            <input type="text" id="state" name="state" value="{{ registration[9] }}">
                        </div>
                    </div>
                </div>

                <!-- Course Information Section -->
                <div class="form-section">
                    <h2><i class="fas fa-book" style="margin-right: 8px;"></i>Course Information</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="course">Course <span style="color: var(--danger);">*</span></label>
                            <select id="course" name="course" required>
                                <option value="">Select a course...</option>
                                <option value="Web Development" {% if registration[10] == 'Web Development' %}selected{% endif %}>Web Development</option>
                                <option value="AI & Robotics" {% if registration[10] == 'AI & Robotics' %}selected{% endif %}>AI & Robotics</option>
                                <option value="Solar Design & Installation" {% if registration[10] == 'Solar Design & Installation' %}selected{% endif %}>Solar Design & Installation</option>
                                <option value="Digital Marketing" {% if registration[10] == 'Digital Marketing' %}selected{% endif %}>Digital Marketing</option>
                                <option value="HSE Management" {% if registration[10] == 'HSE Management' %}selected{% endif %}>HSE Management</option>
                                <option value="Solarpreneurship" {% if registration[10] == 'Solarpreneurship' %}selected{% endif %}>Solarpreneurship</option>
                                <option value="Repair & Maintenance" {% if registration[10] == 'Repair & Maintenance' %}selected{% endif %}>Repair & Maintenance</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="level">Level</label>
                            <select id="level" name="level">
                                <option value="">Select...</option>
                                <option value="Beginner" {% if registration[12] == 'Beginner' %}selected{% endif %}>Beginner</option>
                                <option value="Intermediate" {% if registration[12] == 'Intermediate' %}selected{% endif %}>Intermediate</option>
                                <option value="Advanced" {% if registration[12] == 'Advanced' %}selected{% endif %}>Advanced</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="duration">Duration</label>
                            <select id="duration" name="duration">
                                <option value="">Select...</option>
                                <option value="1 Week" {% if registration[11] == '1 Week' %}selected{% endif %}>1 Week</option>
                                <option value="2 Weeks" {% if registration[11] == '2 Weeks' %}selected{% endif %}>2 Weeks</option>
                                <option value="1 Month" {% if registration[11] == '1 Month' %}selected{% endif %}>1 Month</option>
                                <option value="3 Months" {% if registration[11] == '3 Months' %}selected{% endif %}>3 Months</option>
                                <option value="6 Months" {% if registration[11] == '6 Months' %}selected{% endif %}>6 Months</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Educational Background Section -->
                <div class="form-section">
                    <h2><i class="fas fa-graduation-cap" style="margin-right: 8px;"></i>Educational Background</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="qualification">Qualification</label>
                            <input type="text" id="qualification" name="qualification" value="{{ registration[13] }}">
                        </div>
                        <div class="form-group">
                            <label for="experience">Experience (Years)</label>
                            <input type="text" id="experience" name="experience" value="{{ registration[15] }}">
                        </div>
                    </div>
                </div>

                <!-- Additional Information Section -->
                <div class="form-section">
                    <h2><i class="fas fa-lightbulb" style="margin-right: 8px;"></i>Additional Information</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="goals">Goals/Objectives</label>
                            <textarea id="goals" name="goals">{{ registration[14] }}</textarea>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="info_source">How did you hear about us?</label>
                            <select id="info_source" name="info_source">
                                <option value="">Select...</option>
                                <option value="Social Media" {% if registration[16] == 'Social Media' %}selected{% endif %}>Social Media</option>
                                <option value="Friend/Family" {% if registration[16] == 'Friend/Family' %}selected{% endif %}>Friend/Family</option>
                                <option value="Google Search" {% if registration[16] == 'Google Search' %}selected{% endif %}>Google Search</option>
                                <option value="Website" {% if registration[16] == 'Website' %}selected{% endif %}>Website</option>
                                <option value="Advertisement" {% if registration[16] == 'Advertisement' %}selected{% endif %}>Advertisement</option>
                                <option value="Other" {% if registration[16] == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="submit" class="btn-submit btn-primary">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn-submit btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
